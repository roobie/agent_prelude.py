name: CI (uv manager, mise runner)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and provision Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: 'true'
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
            **/requirements*.txt

      - name: Show uv info
        run: |
          uv --version
          uv python --version || true

      - name: Sync virtual environment (install deps via uv)
        run: |
          # Use --frozen to avoid modifying the lockfile during CI
          uv sync --frozen

      - name: Install mise (script)
        run: |
          # Install mise using the official installer script and add to PATH
          curl -sSf https://mise.run | sh
          echo "$HOME/.local/share/mise/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH

      - name: Trust local mise config
        run: |
          # mark repository mise.toml as trusted so mise can parse templates or envs non-interactively
          mise trust --yes || true

      - name: Run quality pipeline (via mise)
        run: |
          mise run quality

      - name: Build distribution (via uv)
        run: |
          # Use uv to build the project artifacts
          uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
